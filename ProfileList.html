.single_advisor_profile {
    position: relative;
    margin-bottom: 50px;
    -webkit-transition-duration: 500ms;
    transition-duration: 500ms;
    z-index: 1;
    border-radius: 15px;
    -webkit-box-shadow: 0 0.25rem 1rem 0 rgba(47, 91, 234, 0.125);
    box-shadow: 0 0.25rem 1rem 0 rgba(47, 91, 234, 0.125);
}
.single_advisor_profile .advisor_thumb {
    position: relative;
    z-index: 1;
    border-radius: 15px 15px 0 0;
    margin: 0 auto;
    padding: 30px 30px 0 30px;
    background-color: #62b0ff;
    overflow: hidden;
}
.single_advisor_profile .advisor_thumb::after {
    -webkit-transition-duration: 500ms;
    transition-duration: 500ms;
    position: absolute;
    width: 150%;
    height: 80px;
    bottom: -45px;
    left: -25%;
    content: "";
    background-color: #ffffff;
    -webkit-transform: rotate(-15deg);
    transform: rotate(-15deg);
}
@media only screen and (max-width: 575px) {
    .single_advisor_profile .advisor_thumb::after {
        height: 160px;
        bottom: -90px;
    }
}
.single_advisor_profile .advisor_thumb .social-info {
    position: absolute;
    z-index: 1;
    width: 100%;
    bottom: 0;
    right: 30px;
    text-align: right;
}
.single_advisor_profile .advisor_thumb .social-info a {
    font-size: 14px;
    color: #020710;
    padding: 0 5px;
}
.single_advisor_profile .advisor_thumb .social-info a:hover,
.single_advisor_profile .advisor_thumb .social-info a:focus {
    color: #3f43fd;
}
.single_advisor_profile .advisor_thumb .social-info a:last-child {
    padding-right: 0;
}
.single_advisor_profile .single_advisor_details_info {
    position: relative;
    z-index: 1;
    padding: 30px;
    text-align: right;
    -webkit-transition-duration: 500ms;
    transition-duration: 500ms;
    border-radius: 0 0 15px 15px;
    background-color: #ffffff;
}
.single_advisor_profile .single_advisor_details_info::after {
    -webkit-transition-duration: 500ms;
    transition-duration: 500ms;
    position: absolute;
    z-index: 1;
    width: 50px;
    height: 3px;
    background-color: #3f43fd;
    content: "";
    top: 12px;
    right: 30px;
}
.single_advisor_profile .single_advisor_details_info h6 {
    margin-bottom: 0.25rem;
    -webkit-transition-duration: 500ms;
    transition-duration: 500ms;
}
@media only screen and (min-width: 768px) and (max-width: 991px) {
    .single_advisor_profile .single_advisor_details_info h6 {
        font-size: 14px;
    }
}
.single_advisor_profile .single_advisor_details_info p {
    -webkit-transition-duration: 500ms;
    transition-duration: 500ms;
    margin-bottom: 0;
    font-size: 14px;
}
@media only screen and (min-width: 768px) and (max-width: 991px) {
    .single_advisor_profile .single_advisor_details_info p {
        font-size: 12px;
    }
}
.single_advisor_profile:hover .advisor_thumb::after,
.single_advisor_profile:focus .advisor_thumb::after {
    background-color: #070a57;
}
.single_advisor_profile:hover .advisor_thumb .social-info a,
.single_advisor_profile:focus .advisor_thumb .social-info a {
    color: #ffffff;
}
.single_advisor_profile:hover .advisor_thumb .social-info a:hover,
.single_advisor_profile:hover .advisor_thumb .social-info a:focus,
.single_advisor_profile:focus .advisor_thumb .social-info a:hover,

@import url("https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap");

*,
*::after,
*::before {
    box-sizing: inherit;
}

label,
button {
    cursor: pointer;
}

figure {
    margin-inline: 0;
    margin-block: 0.25rem;
}

h1,
h2,
h3,
h4,
p {
    margin: 0;
    font-size: inherit;
    line-height: 1.1;
}

input[type="checkbox"] {
    display: none;
}

body {
    margin-top:20px;
    box-sizing: border-box;
    display: block;
    place-content: center;
    margin: 0;
    min-block-size: 100vh;
    font-family: "Poppins", sans-serif;
    background: linear-gradient(135deg, #2f2b60, #8e44ad);
}

:root {
    --bg--primary: hsl(203, 7%, 92%);
    --bg--active: hsla(203, 86%, 93%, 0.7);
    --bg--hover: hsl(200, 7%, 84%);
    --bg--focus: hsl(203, 100%, 100%);
    --gray--primary: hsl(200, 10%, 50%);
    --gray--secondary: hsl(200, 14%, 30%);

    --dark--primary: hsl(203, 13%, 14%);
    --dark--secondary: hsl(203, 4%, 29%);

    --accent--primary: hsl(206, 90%, 56%);
    --accent--secondary: hsl(206, 79%, 58%);

    --expanded: 16.875rem;
    --collapsed: 3.25rem;
    --svg: 1.125rem;
    --item: 2.25rem;
    --brad-outer: 0.75rem;
    --frame-space: 0.5rem;
    --brad-inner: calc(var(--brad-outer) - var(--frame-space));
}

.vertical-sidebar {
    display: flex;
    inline-size: var(--expanded);
    margin-block: 5vmin;
    position: fixed;
    margin-left: 15px;
    margin-top: 110px;
    z-index: 1000;
}

nav {
    background: var(--bg--primary);
    display: flex;
    flex-flow: column;
    min-width: var(--collapsed);
    border-radius: var(--brad-outer);
    flex: 0 0 auto;
    transition: flex-basis 300ms ease-out;
    will-change: flex-basis;
    padding: var(--frame-space);
    box-shadow: 0 3px 5px #1233, 0 5px 17px #0003;
}

.vertical-sidebar :checked ~ nav {
    flex-basis: var(--expanded);
}

.vertical-sidebar :not(:checked) ~ nav {
    flex-basis: var(--collapsed);
}

header {
    display: flex;
    flex-flow: column;
    justify-content: center;
    gap: 0.5rem;
}

.sidebar__toggle-container {
    block-size: var(--item);
    display: flex;
    justify-content: end;
}

.nav__toggle {
    block-size: 100%;
    background: none;
    transition: all 233ms ease-in;
    border-radius: var(--brad-inner);
    outline: 2px solid transparent;
    outline-offset: -2px;
    overflow: hidden;
}

.toggle--icons {
    block-size: inherit;
    aspect-ratio: 1;
    display: inline-grid;
    place-content: center;
    grid-template-areas: "svg";
    z-index: 10;
}

.toggle-svg-icon {
    grid-area: svg;
    fill: var(--gray--primary);
    transition: fill 233ms ease-in;
}

.nav__toggle:hover {
    outline: 2px solid var(--accent--primary);
}

.toggle--icons:hover .toggle-svg-icon {
    fill: var(--dark--primary);
}

figure {
    display: flex;
    flex-direction: column;
    justify-content: center;
    container-type: inline-size;
    gap: 0.375rem;
}

.codepen-logo {
    margin-inline: auto;
    display: block;
    min-inline-size: 2.25rem;
    max-inline-size: 45cqi;
    aspect-ratio: 1;
    block-size: 100%;
    object-fit: cover;
    transition: width 100ms linear;
}

figcaption {
    text-align: center;
}

.user-id {
    font-size: 1.0625rem;
    font-weight: 500;
    margin-block-end: 0.25rem;
    color: var(--gray--secondary);
}

.user-role {
    font-size: 0.875rem;
    font-weight: 500;
    color: var(--gray--primary);
}

.sidebar__wrapper {
    --list-gap: 0.5rem;
    display: flex;
    flex-flow: column;
    gap: var(--list-gap);
}

.sidebar__list {
    margin: 0;
    padding: 0;
    list-style: none;
    display: flex;
    flex-flow: column;
    gap: 0.125rem;
    overflow: hidden;
}

.sidebar__item {
    block-size: var(--item);
    border-radius: var(--brad-inner);
}

.item--heading {
    display: flex;
    align-items: end;
}

.sidebar__item--heading {
    margin-block-end: 0.4rem;
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.35px;
    font-weight: 500;
    color: var(--gray--primary);
    transition: color 200ms ease-in;
}

.sidebar__list:has(.sidebar__link):hover .sidebar__item--heading {
    color: var(--gray--secondary);
}

.sidebar__link {
    display: flex;
    text-decoration: none;
    block-size: 100%;
    align-items: center;
    gap: 0.5rem;
    outline: 2px solid transparent;
    border-radius: inherit;
}

.icon {
    aspect-ratio: 1;
    block-size: 100%;
    display: inline-grid;
    svg {
        place-self: center;
        inline-size: var(--svg);
        block-size: var(--svg);
        fill: var(--gray--primary);
    }
}

.text {
    pointer-events: none;
    color: var(--gray--secondary);
    font-size: 0.875em;
    font-weight: 500;
    transition: color 266ms ease-out;
}

.sidebar__link:hover {
    background: var(--bg--hover);
    .icon svg {
        fill: var(--accent--primary);
    }
    .text {
        color: var(--dark--primary);
    }
}

.sidebar__link:focus {
    outline: 2px solid var(--accent--secondary);
    outline-offset: -2px;
    background: var(--bg--focus);
    .icon svg {
        fill: var(--accent--primary);
    }
}

.sidebar__link:active {
    background-color: var(--bg--active);
}

aside:not(:has(:checked)) .toggle--open,
aside:has(:checked) .toggle--close {
    opacity: 0;
}

aside:not(:has(:checked)) :where(figcaption, .item--heading) {
    opacity: 0;
}

aside:has(:checked) :where(figcaption, .item--heading) {
    transition: opacity 300ms ease-in 200ms;
}

[data-tooltip]::before {
    content: attr(data-tooltip);
    position: fixed;
    translate: calc(var(--item) * 1.5) calc(var(--item) * 0.125);
    border-radius: var(--brad-inner);
    padding: 0.125rem 0.5rem;
    color: #ddd;
    background-color: hsl(198 16 30);
    box-shadow: 0 6px 12px -6px #0003;
    opacity: 0;
    pointer-events: none;
    scale: 0 0;
    z-index: 999;
    font-size: 0.75rem;
    font-weight: 500;
    transition: all 350ms ease-out;
}

aside:not(:has(:checked))
    .sidebar__link:where(:hover, :focus-visible)[data-tooltip]::before {
    opacity: 1;
    scale: 1;
}


.sidebar__item:where(:hover, :focus-visible)[data-tooltip]::before {
    opacity: 1;
    scale: 1;
}

.container {

      font-size: 48px;
      margin-bottom: 50px;
      text-align: center;
      font-family: 'Poppins', sans-serif;
      color: #3b3b98;
    }
